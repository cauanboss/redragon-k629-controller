<div id="status-bar">
  <div class="status-left">
    <span class="badge" [ngClass]="wsBadgeClass">{{ wsBadgeText }}</span>
    <span class="badge" [ngClass]="keyboardBadgeClass">{{ keyboardBadgeText }}</span>
    <span id="status-text">{{ statusText }}</span>
  </div>
  <span id="connection-info">ws://localhost:3000</span>
</div>
