<div id="toolbar">
  <div class="toolbar-group" id="effect-group">
    <span class="group-label">Effects</span>
    <button
      *ngFor="let effect of effects"
      class="btn btn-effect"
      [class.btn-active]="isEffectActive(effect.id)"
      (click)="onEffectClick(effect.id)"
    >
      {{ effect.label }}
    </button>
  </div>

  <div class="toolbar-group">
    <span class="group-label">Brightness</span>
    <div class="slider-container">
      <input
        type="range"
        [value]="brightness"
        min="0"
        max="10"
        step="1"
        (input)="brightness = +$any($event.target).value; onBrightnessChange()"
      />
      <span class="slider-value">{{ brightness }}</span>
    </div>
  </div>

  <div class="toolbar-group">
    <span class="group-label">Speed</span>
    <div class="slider-container">
      <input
        type="range"
        [value]="speed"
        min="0"
        max="5"
        step="1"
        (input)="speed = +$any($event.target).value; onSpeedChange()"
      />
      <span class="slider-value">{{ speed }}</span>
    </div>
  </div>

  <div class="toolbar-group">
    <button class="btn" (click)="onApplyColor()">Apply Color</button>
    <input
      type="color"
      class="color-swatch"
      [(ngModel)]="colorPickerValue"
    />
    <button
      class="btn btn-selected"
      (click)="onApplyToSelected()"
      [class.btn-selected]="selectedKeyCount > 0"
    >
      Apply to Selected
    </button>
    <button class="btn" (click)="onClearSelection()">Clear Sel</button>
    <span class="selection-info" *ngIf="selectedKeyCount > 0">
      {{ selectedKeyCount }} key(s) selected
    </span>
    <button class="btn btn-danger" (click)="onReset()">Reset</button>
  </div>
</div>
